<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Słowo Boże</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Lora', serif;
            /* Kolor tła przypominający jasny pergamin */
            background-color: #fdfbf7;
            background-image: radial-gradient(#f4ebd0 15%, transparent 16%), radial-gradient(#f4ebd0 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: #3b2f2f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: #fffefb;
            padding: 40px 30px;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(59, 47, 47, 0.1);
            border: 1px solid #eaddc5;
            max-width: 90%;
            width: 400px;
            position: relative;
        }
        /* Złoty krzyżyk na górze ramki */
        .container::before {
            content: "✝";
            font-size: 2em;
            color: #d4af37;
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            background: #fffefb;
            padding: 0 15px;
        }
        /* Animacja ładowania */
        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }
        .pulse {
            animation: pulse 1.5s infinite ease-in-out;
            color: #d4af37;
            font-size: 1.2em;
            font-style: italic;
        }
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.5; transform: scale(0.98); }
        }
        /* Treść wersetu (ukryta na start) */
        #content {
            display: none; 
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #tekst {
            font-size: 1.3em;
            line-height: 1.6;
            font-style: italic;
            margin-bottom: 25px;
            margin-top: 15px;
        }
        #sigla {
            font-weight: bold;
            color: #d4af37;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader">
            <div class="pulse">Szukam Słowa dla Ciebie...</div>
        </div>
        
        <div id="content">
            <div id="tekst"></div>
            <div id="sigla"></div>
        </div>
    </div>

    <script>
        // 1. Rejestracja Service Workera dla trybu Offline (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Tryb offline działa (SW zarejestrowany!)'))
                    .catch(err => console.error('Błąd PWA:', err));
            });
        }

        // 2. Pobieranie cytatów z opóźnioną animacją
        fetch('./biblia.json')
            .then(response => response.json())
            .then(data => {
                const randomIndex = Math.floor(Math.random() * data.length);
                const wylosowanyCytat = data[randomIndex];

                // Ustawiamy timer na 1.5 sekundy (1500ms), aby pokazać animację
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                    
                    document.getElementById('tekst').innerText = `"${wylosowanyCytat.tekst}"`;
                    document.getElementById('sigla').innerText = wylosowanyCytat.sigla;
                }, 1500);
            })
            .catch(error => {
                console.error('Błąd:', error);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('tekst').innerText = "Zapisano w trybie offline. Brak dostępu do nowej bazy.";
            });
    </script>
</body>
</html>
