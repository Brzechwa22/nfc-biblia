<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Słowo na dziś</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        #tekst {
            font-size: 1.2em;
            font-style: italic;
            margin-bottom: 20px;
        }
        #sigla {
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="tekst">Ładowanie Słowa...</div>
        <div id="sigla"></div>
    </div>

    <script>
        // Pobieramy plik JSON
        fetch('biblia.json')
            .then(response => response.json())
            .then(data => {
                // Losowanie indeksu z tablicy
                const randomIndex = Math.floor(Math.random() * data.length);
                const wylosowanyCytat = data[randomIndex];

                // Wstawienie danych do HTML
                document.getElementById('tekst').innerText = `"${wylosowanyCytat.tekst}"`;
                document.getElementById('sigla').innerText = wylosowanyCytat.sigla;
            })
            .catch(error => {
                console.error('Błąd podczas ładowania pliku:', error);
                document.getElementById('tekst').innerText = "Nie udało się załadować cytatu. Spróbuj ponownie.";
            });
    </script>

</body>
</html>
